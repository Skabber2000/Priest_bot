name = "priest-worker"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# Comma-separated list of origins allowed to call /chat.
# Override in production with your GitHub Pages URL.
[vars]
ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"
MODEL = "claude-sonnet-4-6"
MAX_OUTPUT_TOKENS = "1024"
MAX_INPUT_CHARS = "2000"
MAX_HISTORY_TURNS = "20"

# Secrets — set with `wrangler secret put ANTHROPIC_API_KEY` (and optionally TURNSTILE_SECRET).
# For local dev, put them in `.dev.vars` (gitignored).
